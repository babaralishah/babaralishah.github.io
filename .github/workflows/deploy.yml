name: Deploy site to Pages

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy_1.outputs.page_url || steps.deploy_2.outputs.page_url || steps.deploy_3.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_1
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy_2
        if: steps.deploy_1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy_3
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Fail if all deploy attempts fail
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure' && steps.deploy_3.outcome == 'failure'
        run: |
          echo "Pages deployment failed after 3 attempts"
          exit 1
